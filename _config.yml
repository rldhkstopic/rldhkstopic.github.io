title: "My Research Notes"
description: "A space for brainstorming and drafting research ideas."
theme: minima
markdown: kramdown
paginate: 5

# Optional settings
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Minima theme settings
minima:
  skin: dark
  social_links:
    github: rldhkstopic

# Enable Disqus for comments (optional)
# disqus:
#   shortname: your_disqus_shortname

# Enable syntax highlighting for code snippets
highlighter: rouge
